services:
  postgres:
    image: postgres:16-alpine
    container_name: offeropstrex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: offeropstrex
      POSTGRES_USER: offerops
      POSTGRES_PASSWORD: offerops_local_only
    ports:
      - "5432:5432"
    volumes:
      - offeropstrex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offerops -d offeropstrex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  offeropstrex-postgres-data:
