openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: OfferOps API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: workspace-members
    description: User-workspace access assignments
  - name: employees
    description: Employee management
  - name: goals
    description: Goal management
  - name: daily-reports
    description: Daily report management
  - name: testing-batches
    description: Testing batch management
  - name: offers
    description: Offer management
  - name: performance
    description: Performance data
  - name: todo-tasks
    description: Todo task management
  - name: admin
    description: Admin-only operations (Phase 8)
  - name: dashboard
    description: Dashboard and analytics
  - name: settings
    description: Application settings
  - name: notifications
    description: In-app notifications
  - name: queues
    description: Workflow queue summaries
  - name: sync
    description: Voluum data sync and workspace management
  - name: workspace-traffic-sources
    description: Per-workspace traffic-source rotation order (Phase 8)
  - name: affiliate-networks
    description: Manual affiliate-network lookup (Pivot Phase 2)
  - name: geos
    description: Manual GEO lookup (Pivot Phase 2)
  - name: campaigns
    description: Manual campaign rows per testing batch (Pivot Phase 4+)
  - name: batch-results
    description: Manual batch performance results (Pivot Phase 4+)
paths:
  /affiliate-networks:
    get:
      operationId: listAffiliateNetworks
      tags: [affiliate-networks]
      summary: List affiliate networks (workspace-scoped)
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of affiliate networks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AffiliateNetwork"
    post:
      operationId: createAffiliateNetwork
      tags: [affiliate-networks]
      summary: Create an affiliate network (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAffiliateNetworkBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateNetwork"
        "409":
          description: Duplicate name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /affiliate-networks/{id}:
    patch:
      operationId: updateAffiliateNetwork
      tags: [affiliate-networks]
      summary: Update an affiliate network (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAffiliateNetworkBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateNetwork"
    delete:
      operationId: deleteAffiliateNetwork
      tags: [affiliate-networks]
      summary: Delete an affiliate network (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "409":
          description: In use by batches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /geos:
    get:
      operationId: listGeos
      tags: [geos]
      summary: List GEOs (workspace-scoped)
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of GEOs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Geo"
    post:
      operationId: createGeo
      tags: [geos]
      summary: Create a GEO (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGeoBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Geo"
        "409":
          description: Duplicate code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /geos/{id}:
    patch:
      operationId: updateGeo
      tags: [geos]
      summary: Update a GEO (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGeoBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Geo"
    delete:
      operationId: deleteGeo
      tags: [geos]
      summary: Delete a GEO (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "409":
          description: In use by batches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns (workspace-scoped, optional batch filter)
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
        - name: batch_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a manual campaign row
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Batch not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate campaign for batch+platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/{id}:
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign row (status flips emit CampaignStatusChanged)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /batch-results:
    get:
      operationId: listBatchResults
      tags: [batch-results]
      summary: List batch results (workspace-scoped, optional batch filter)
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
        - name: batch_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of batch results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchResult"
    post:
      operationId: recordBatchResult
      tags: [batch-results]
      summary: Record (upsert) batch results — one row per batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordBatchResultBody"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResult"
        "404":
          description: Batch not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /batch-results/{id}:
    patch:
      operationId: updateBatchResult
      tags: [batch-results]
      summary: Update an existing batch results row
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatchResultBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /testing-batches/{id}/campaigns-go-live:
    post:
      operationId: campaignsGoLive
      tags: [testing-batches]
      summary: |
        Pivot Phase 5 atomic go-live — stamps batch.live_at and flips
        both batch campaigns from `ready` to `live` in a single
        transaction. Idempotent: a campaign already `live` is left as-is.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestingBatch"
        "404":
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/my-workspaces:
    get:
      operationId: getMyWorkspaces
      tags: [auth]
      summary: Get workspaces accessible to the current user
      description: Admins see all workspaces. Employees see only assigned workspaces.
      responses:
        "200":
          description: List of accessible workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoluumWorkspace"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspace-members:
    get:
      operationId: listWorkspaceMembers
      tags: [workspace-members]
      summary: List members of a workspace
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of workspace members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
    post:
      operationId: addWorkspaceMember
      tags: [workspace-members]
      summary: Assign an employee to a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWorkspaceMemberBody"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "409":
          description: Already assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspace-members/{id}:
    delete:
      operationId: removeWorkspaceMember
      tags: [workspace-members]
      summary: Remove an employee from a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      description: |
        When `workspace_id` is provided, returns only employees assigned to that
        workspace (admins are always included, since they implicitly have access
        to all workspaces). When omitted, returns the global employee list and
        requires admin authentication (used by the workspace member-add picker).
      parameters:
        - name: workspace_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"

    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goals
      parameters:
        - name: employee_id
          in: query
          schema:
            type: integer
        - name: period_type
          in: query
          schema:
            type: string
            enum: [weekly, monthly]
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"

    post:
      operationId: createGoal
      tags: [goals]
      summary: Create goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoalBody"
      responses:
        "201":
          description: Goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/{id}:
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get goal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

    patch:
      operationId: updateGoal
      tags: [goals]
      summary: Update goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGoalBody"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /daily-reports:
    get:
      operationId: listDailyReports
      tags: [daily-reports]
      summary: List daily reports
      parameters:
        - name: employee_id
          in: query
          schema:
            type: integer
        - name: date_from
          in: query
          schema:
            type: string
        - name: date_to
          in: query
          schema:
            type: string
        - name: workspace_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of daily reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyReport"

    post:
      operationId: createDailyReport
      tags: [daily-reports]
      summary: Create daily report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyReportBody"
      responses:
        "201":
          description: Daily report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /daily-reports/{id}:
    get:
      operationId: getDailyReport
      tags: [daily-reports]
      summary: Get daily report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

    patch:
      operationId: updateDailyReport
      tags: [daily-reports]
      summary: Update daily report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyReportBody"
      responses:
        "200":
          description: Updated daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /weekly-reports:
    get:
      operationId: listWeeklyReports
      tags: [daily-reports]
      summary: List weekly aggregated reports
      parameters:
        - name: employee_id
          in: query
          schema:
            type: integer
        - name: week_start
          in: query
          schema:
            type: string
        - name: workspace_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of weekly reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyReport"

  /testing-batches:
    post:
      operationId: createTestingBatch
      tags: [testing-batches]
      summary: Create a testing batch (manual flow — Pivot Phase 3)
      description: |
        Worker-accessible manual batch creation. Accepts the new
        spec payload (affiliateNetworkId / geoId / trafficSourceId /
        assignedWorkerId / testRound / startDate / testDurationHours)
        and ALSO accepts the legacy text payload for backward compat
        (with a deprecation log).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestingBatchBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestingBatch"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTestingBatches
      tags: [testing-batches]
      summary: List testing batches
      parameters:
        - name: employee_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: geo
          in: query
          schema:
            type: string
        - name: affiliate_network
          in: query
          schema:
            type: string
        - name: traffic_source
          in: query
          schema:
            type: string
        - name: workspace_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of testing batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestingBatch"

  /testing-batches/{id}:
    get:
      operationId: getTestingBatch
      tags: [testing-batches]
      summary: Get testing batch by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Testing batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestingBatch"

    patch:
      operationId: updateTestingBatch
      tags: [testing-batches]
      summary: Update testing batch (triggers automation if status -> tested)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTestingBatchBody"
      responses:
        "200":
          description: Updated testing batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestingBatch"

    delete:
      operationId: deleteTestingBatch
      tags: [testing-batches]
      summary: Delete testing batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /testing-batches/{id}/go-live:
    post:
      operationId: goLiveBatch
      tags: [testing-batches]
      summary: Mark batch as live (campaign active in tracker)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch is now live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestingBatch"

  /testing-batches/{id}/mark-ready:
    post:
      operationId: markBatchReady
      tags: [testing-batches]
      summary: Mark batch as ready for optimization (conditions met)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch moved to ready_for_optimization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestingBatch"

  /testing-batches/{id}/start-optimization:
    post:
      operationId: startOptimization
      tags: [testing-batches]
      summary: Start optimizing a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch moved to optimizing
          content:
            application/json:
              schema:
