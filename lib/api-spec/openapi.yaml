    get:
      operationId: listWorkspaceTrafficSources
      tags: [workspace-traffic-sources]
      summary: |
        Phase 8 — list a workspace's traffic-source rotation order. Sorted by
        `position` ascending. Readable by any workspace member (Pivot Phase 3
        opened this up so workers can pick a traffic source when creating a
        manual batch); writes remain admin-only.
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of workspace traffic sources, ordered by position
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceTrafficSource"
    post:
      operationId: createWorkspaceTrafficSource
      tags: [workspace-traffic-sources]
      summary: Append a traffic source to the workspace rotation. Admin-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceTrafficSourceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceTrafficSource"

  /admin/workspace-traffic-sources/reorder:
    patch:
      operationId: reorderWorkspaceTrafficSources
      tags: [workspace-traffic-sources]
      summary: |
        Atomically renumber positions for a workspace. Body provides the
        complete ordered list of source ids (every active+inactive id in the
        workspace). Admin-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderWorkspaceTrafficSourcesBody"
      responses:
        "200":
          description: Updated rotation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceTrafficSource"

  /admin/workspace-traffic-sources/{id}:
    patch:
      operationId: updateWorkspaceTrafficSource
      tags: [workspace-traffic-sources]
      summary: Update name / isActive of a workspace traffic source. Admin-only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceTrafficSourceBody"
      responses:
        "200":
          description: Updated row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceTrafficSource"
    delete:
      operationId: deleteWorkspaceTrafficSource
      tags: [workspace-traffic-sources]
      summary: |
        Delete a workspace traffic source. Rejected with 409 if any active
        testing batch's `traffic_source_order_snapshot` references this id —
        keeps in-flight rotations consistent. Admin-only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "409":
          description: Conflict — referenced by an in-flight batch snapshot

  /settings/traffic-source-device-plan:
    get:
      operationId: getTrafficSourceDevicePlan
      tags: [settings]
      summary: List enabled (traffic_source, device) pairs for a workspace
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of plan rows (only enabled ones; one row per (workspace, traffic source, device))
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrafficSourceDevicePlan"
    put:
      operationId: putTrafficSourceDevicePlan
      tags: [settings]
      summary: Replace the workspace's enabled (traffic_source, device) pairs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutTrafficSourceDevicePlanBody"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrafficSourceDevicePlan"

  /settings/voluum:
    get:
      operationId: getVoluumSettings
      tags: [settings]
      summary: Get Voluum API settings
      responses:
        "200":
          description: Voluum settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoluumSettings"

    patch:
      operationId: updateVoluumSettings
      tags: [settings]
      summary: Update Voluum API settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVoluumSettingsBody"
      responses:
        "200":
          description: Updated Voluum settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoluumSettings"

